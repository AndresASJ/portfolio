<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ASJ monogram: bold wordmark between two rules. Adapts to light/dark tabs. -->
  <style>
    .mark { fill: #0a0a0a; }
    @media (prefers-color-scheme: dark) { .mark { fill: #f1e7d7; } }
  </style>
  <rect class="mark" x="9" y="10" width="46" height="6" rx="1.5"/>
  <rect class="mark" x="9" y="48" width="46" height="6" rx="1.5"/>
  <text class="mark" x="32" y="40" text-anchor="middle"
    font-family="'Helvetica Neue', Arial, system-ui, sans-serif"
    font-size="30" font-weight="800" letter-spacing="-0.5">ASJ</text>
</svg>
